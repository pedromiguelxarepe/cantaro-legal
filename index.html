<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cantaro · Legal</title><style>
:root{ --paper:#E8DFCE; --surface:#F4EDE0; --ink:#2B2620; --ink2:#6F665A;
       --brick:#BA4D3B; --line:#D8CDB8; }
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;background:var(--paper);color:var(--ink);
     font:17px/1.65 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,serif;
     padding:0 20px}
.wrap{max-width:680px;margin:0 auto;padding:56px 0 80px}
.brand{font-weight:700;letter-spacing:.5px;text-transform:uppercase;
       font-size:13px;color:var(--brick);margin:0 0 6px}
h1{font-size:32px;line-height:1.15;margin:0 0 6px;font-weight:800}
.eff{color:var(--ink2);font-size:15px;margin:0 0 28px}
h2{font-size:20px;margin:34px 0 8px;font-weight:700}
p{margin:0 0 14px}
a{color:var(--brick)}
strong{font-weight:700}
.card{background:var(--surface);border:1px solid var(--line);border-radius:16px;
      padding:22px 26px;margin:0 0 18px}
.nav{margin:0 0 30px;font-size:15px}
.nav a{margin-right:18px;text-decoration:none}
footer{margin-top:46px;color:var(--ink2);font-size:13px;border-top:1px solid var(--line);
       padding-top:18px}
</style></head>
<body><div class="wrap">
<p class="brand">Cantaro</p>
<h1>Legal</h1>
<p class="eff">Cantaro is a calm, ad-free tarot app for reflection.</p>
<div class="card">
<p><a href="privacy.html">Privacy Policy</a></p>
<p><a href="terms.html">Terms of Use</a></p>
</div>
<footer>© 2026 Pedro Miguel Xarepe · pedromiguelxarepe@gmail.com</footer>
</div></body></html>
